name: Setup TV Files

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create TV files
        run: |
          mkdir -p app/src/main/java/io/github/romanvht/byedpi/activities
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          
          # TvMainActivity.kt
          cat > app/src/main/java/io/github/romanvht/byedpi/activities/TvMainActivity.kt << 'EOF'
          package io.github.romanvht.byedpi.activities

          import android.annotation.SuppressLint
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.content.IntentFilter
          import android.net.VpnService
          import android.os.Build
          import android.os.Bundle
          import android.util.Log
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.fragment.app.FragmentActivity
          import io.github.romanvht.byedpi.R
          import io.github.romanvht.byedpi.data.*
          import io.github.romanvht.byedpi.databinding.ActivityTvMainBinding
          import io.github.romanvht.byedpi.services.ServiceManager
          import io.github.romanvht.byedpi.services.appStatus
          import io.github.romanvht.byedpi.utility.*

          class TvMainActivity : FragmentActivity() {
              private lateinit var binding: ActivityTvMainBinding

              companion object {
                  private val TAG = TvMainActivity::class.java.simpleName
              }

              private val vpnRegister =
                  registerForActivityResult(ActivityResultContracts.StartActivityForResult()) {
                      if (it.resultCode == RESULT_OK) {
                          ServiceManager.start(this, Mode.VPN)
                      } else {
                          Toast.makeText(this, R.string.vpn_permission_denied, Toast.LENGTH_SHORT).show()
                          updateUI()
                      }
                  }

              private val receiver = object : BroadcastReceiver() {
                  override fun onReceive(context: Context?, intent: Intent?) {
                      Log.d(TAG, "Broadcast received: \${intent?.action}")
                      when (intent?.action) {
                          STARTED_BROADCAST, STOPPED_BROADCAST, FAILED_BROADCAST -> updateUI()
                      }
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  binding = ActivityTvMainBinding.inflate(layoutInflater)
                  setContentView(binding.root)

                  val intentFilter = IntentFilter().apply {
                      addAction(STARTED_BROADCAST)
                      addAction(STOPPED_BROADCAST)
                      addAction(FAILED_BROADCAST)
                  }

                  @SuppressLint("UnspecifiedRegisterReceiverFlag")
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(receiver, intentFilter, RECEIVER_EXPORTED)
                  } else {
                      registerReceiver(receiver, intentFilter)
                  }

                  binding.toggleButton.setOnClickListener {
                      val (status, _) = appStatus
                      when (status) {
                          AppStatus.Halted -> start()
                          AppStatus.Running -> stop()
                      }
                  }

                  binding.settingsButton.setOnClickListener {
                      startActivity(Intent(this, SettingsActivity::class.java))
                  }

                  binding.toggleButton.requestFocus()
                  updateUI()
              }

              override fun onResume() {
                  super.onResume()
                  updateUI()
              }

              override fun onDestroy() {
                  super.onDestroy()
                  unregisterReceiver(receiver)
              }

              private fun start() {
                  when (getPreferences().mode()) {
                      Mode.VPN -> {
                          val intentPrepare = VpnService.prepare(this)
                          if (intentPrepare != null) {
                              vpnRegister.launch(intentPrepare)
                          } else {
                              ServiceManager.start(this, Mode.VPN)
                          }
                      }
                      Mode.Proxy -> ServiceManager.start(this, Mode.Proxy)
                  }
              }

              private fun stop() {
                  ServiceManager.stop(this)
              }

              private fun updateUI() {
                  val (status, mode) = appStatus
                  val preferences = getPreferences()
                  val (ip, port) = preferences.getProxyIpAndPort()

                  binding.proxyAddress.text = getString(R.string.proxy_address, ip, port)

                  when (status) {
                      AppStatus.Halted -> {
                          binding.statusText.text = when (preferences.mode()) {
                              Mode.VPN -> getString(R.string.vpn_disconnected)
                              Mode.Proxy -> getString(R.string.proxy_down)
                          }
                          binding.toggleButton.text = getString(R.string.service_start_btn)
                          binding.statusIndicator.setBackgroundResource(R.drawable.status_indicator_off)
                      }
                      AppStatus.Running -> {
                          binding.statusText.text = when (mode) {
                              Mode.VPN -> getString(R.string.vpn_connected)
                              Mode.Proxy -> getString(R.string.proxy_up)
                          }
                          binding.toggleButton.text = getString(R.string.service_stop_btn)
                          binding.statusIndicator.setBackgroundResource(R.drawable.status_indicator_on)
                      }
                  }
              }
          }
          EOF
          
          # activity_tv_main.xml
          cat > app/src/main/res/layout/activity_tv_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="48dp"
              android:background="@color/lb_background">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="@string/app_name"
                  android:textSize="48sp"
                  android:textColor="@android:color/white"
                  android:textStyle="bold"
                  android:layout_marginBottom="32dp"/>

              <View
                  android:id="@+id/status_indicator"
                  android:layout_width="80dp"
                  android:layout_height="80dp"
                  android:background="@drawable/status_indicator_off"
                  android:layout_marginBottom="24dp"/>

              <TextView
                  android:id="@+id/status_text"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="32sp"
                  android:textColor="@android:color/white"
                  android:layout_marginBottom="16dp"
                  tools:text="VPN отключен"/>

              <TextView
                  android:id="@+id/proxy_address"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="24sp"
                  android:textColor="@android:color/darker_gray"
                  android:layout_marginBottom="48dp"
                  tools:text="127.0.0.1:1080"/>

              <Button
                  android:id="@+id/toggle_button"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:minWidth="400dp"
                  android:minHeight="80dp"
                  android:textSize="28sp"
                  android:text="@string/service_start_btn"
                  android:focusable="true"
                  android:focusableInTouchMode="true"
                  android:background="@drawable/tv_button_selector"
                  android:textColor="@android:color/white"/>

              <Button
                  android:id="@+id/settings_button"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:minWidth="400dp"
                  android:minHeight="80dp"
                  android:textSize="28sp"
                  android:text="@string/title_settings"
                  android:layout_marginTop="24dp"
                  android:focusable="true"
                  android:focusableInTouchMode="true"
                  android:background="@drawable/tv_button_selector"
                  android:textColor="@android:color/white"/>

          </LinearLayout>
          EOF
          
          # status_indicator_off.xml
          cat > app/src/main/res/drawable/status_indicator_off.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#CC0000"/>
          </shape>
          EOF
          
          # status_indicator_on.xml
          cat > app/src/main/res/drawable/status_indicator_on.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#00CC00"/>
          </shape>
          EOF
          
          # tv_button_selector.xml
          cat > app/src/main/res/drawable/tv_button_selector.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <selector xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:state_focused="true">
                  <shape android:shape="rectangle">
                      <solid android:color="#5976DF"/>
                      <corners android:radius="8dp"/>
                      <stroke android:width="4dp" android:color="#FFFFFF"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="rectangle">
                      <solid android:color="#3C52A3"/>
                      <corners android:radius="8dp"/>
                  </shape>
              </item>
          </selector>
          EOF
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Add TV UI support'
          title: 'Add Android TV interface'
          body: 'Auto-generated TV files'
          branch: tv-ui-auto
